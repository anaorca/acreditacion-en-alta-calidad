<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador: Mapeo de Actores SNA 2025</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #f2c314;
            --primary-dark: #d4ab10;
            --bg-dark: #111827;
            --card-bg: #1f2937;
            --text-light: #f3f4f6;
            --text-muted: #9ca3af;
            --success: #10b981;
            --error: #ef4444;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-light);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            max-width: 900px;
            width: 100%;
            background: var(--card-bg);
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3);
            border: 1px solid #374151;
        }

        h1 {
            color: var(--primary);
            font-size: 28px;
            margin-bottom: 8px;
            text-align: center;
        }

        .subtitle {
            text-align: center;
            color: var(--text-muted);
            margin-bottom: 32px;
            font-size: 16px;
        }

        .game-area {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
        }

        .column-title {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--primary);
            margin-bottom: 16px;
            font-weight: 700;
        }

        .actors-list, .functions-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .item {
            padding: 16px;
            background: #111827;
            border: 1px solid #374151;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            user-select: none;
            position: relative;
        }

        .item:hover {
            border-color: var(--primary);
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.2);
        }

        .item.selected {
            background: rgba(242, 195, 20, 0.1);
            border-color: var(--primary);
            box-shadow: 0 0 0 2px var(--primary);
        }

        .item.matched {
            opacity: 0.5;
            cursor: default;
            border-color: var(--success);
            background: rgba(16, 185, 129, 0.05);
        }

        .item.matched:hover {
            transform: none;
        }

        .feedback {
            margin-top: 32px;
            padding: 20px;
            border-radius: 12px;
            background: rgba(17, 24, 39, 0.8);
            border-left: 4px solid var(--primary);
            min-height: 60px;
            display: none;
        }

        .feedback.show {
            display: block;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .feedback-title {
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 4px;
        }

        .progress-bar {
            height: 6px;
            background: #374151;
            border-radius: 3px;
            margin-top: 40px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: var(--primary);
            width: 0%;
            transition: width 0.5s ease;
        }

        .btn-reset {
            margin-top: 24px;
            background: transparent;
            border: 1px solid #374151;
            color: var(--text-muted);
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            float: right;
        }

        .btn-reset:hover {
            color: var(--text-light);
            border-color: var(--text-light);
        }

        @media (max-width: 600px) {
            .game-area {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Analizador de Roles SNA</h1>
    <p class="subtitle">Empareje cada actor con su función crítica bajo el marco normativo de 2025.</p>

    <div class="game-area">
        <div>
            <div class="column-title">Actores (Quién)</div>
            <div class="actors-list" id="actors">
                <!-- Se poblará por JS -->
            </div>
        </div>
        <div>
            <div class="column-title">Funciones (Qué hace)</div>
            <div class="functions-list" id="functions">
                <!-- Se poblará por JS -->
            </div>
        </div>
    </div>

    <div id="feedbackContainer" class="feedback">
        <div class="feedback-title" id="feedbackTitle">Respuesta Correcta</div>
        <div id="feedbackText">Explicación técnica aquí.</div>
    </div>

    <div class="progress-bar">
        <div class="progress-fill" id="progressFill"></div>
    </div>

    <button class="btn-reset" onclick="initGame()">Reiniciar Simulador</button>
</div>

<script>
    const data = [
        {
            id: 'actor1',
            name: 'CESU',
            function: 'Define la política de educación superior y expide los Acuerdos (ej. Acuerdo 01 de 2025).',
            expertTip: 'Es el máximo organismo de política. No evalúa carpetas, define las reglas del juego.'
        },
        {
            id: 'actor2',
            name: 'CNA',
            function: 'Realiza la evaluación técnica de alta calidad y coordina el equipo de pares académicos.',
            expertTip: 'Su juicio es eminentemente técnico y se basa en los 12 factores de excelencia.'
        },
        {
            id: 'actor3',
            name: 'MEN',
            function: 'Emite los actos administrativos (Resoluciones) que otorgan o niegan la acreditación legal.',
            expertTip: 'Es el brazo ejecutor. Aunque el CNA recomienda, el Ministerio es quien firma la resolución.'
        },
        {
            id: 'actor4',
            name: 'CONACES',
            function: 'Evalúa condiciones institucionales y de programa para Registro Calificado (apoya al CNA vía 0529/24).',
            expertTip: 'Bajo el Modelo de Confianza, su labor se armoniza con el CNA para evitar duplicidad de trámites.'
        }
    ];

    let selectedActor = null;
    let selectedFunction = null;
    let matchesCount = 0;

    function initGame() {
        const actorsDiv = document.getElementById('actors');
        const functionsDiv = document.getElementById('functions');
        const feedback = document.getElementById('feedbackContainer');
        const progressFill = document.getElementById('progressFill');

        // Reset state
        selectedActor = null;
        selectedFunction = null;
        matchesCount = 0;
        feedback.classList.remove('show');
        progressFill.style.width = '0%';

        // Shuffle arrays
        const shuffledActors = [...data].sort(() => Math.random() - 0.5);
        const shuffledFunctions = [...data].sort(() => Math.random() - 0.5);

        actorsDiv.innerHTML = '';
        functionsDiv.innerHTML = '';

        shuffledActors.forEach(item => {
            const div = document.createElement('div');
            div.className = 'item';
            div.textContent = item.name;
            div.dataset.id = item.id;
            div.onclick = () => selectItem(div, 'actor');
            actorsDiv.appendChild(div);
        });

        shuffledFunctions.forEach(item => {
            const div = document.createElement('div');
            div.className = 'item';
            div.textContent = item.function;
            div.dataset.id = item.id;
            div.onclick = () => selectItem(div, 'function');
            functionsDiv.appendChild(div);
        });
    }

    function selectItem(el, type) {
        if (el.classList.contains('matched')) return;

        if (type === 'actor') {
            document.querySelectorAll('#actors .item').forEach(i => i.classList.remove('selected'));
            selectedActor = el;
            el.classList.add('selected');
        } else {
            document.querySelectorAll('#functions .item').forEach(i => i.classList.remove('selected'));
            selectedFunction = el;
            el.classList.add('selected');
        }

        checkMatch();
    }

    function checkMatch() {
        if (selectedActor && selectedFunction) {
            if (selectedActor.dataset.id === selectedFunction.dataset.id) {
                // Correct Match
                const itemData = data.find(d => d.id === selectedActor.dataset.id);
                
                selectedActor.classList.add('matched');
                selectedFunction.classList.add('matched');
                selectedActor.classList.remove('selected');
                selectedFunction.classList.remove('selected');
                
                showFeedback(`¡Correcto! - ${itemData.name}`, itemData.expertTip);
                
                selectedActor = null;
                selectedFunction = null;
                matchesCount++;
                
                updateProgress();

                if (matchesCount === data.length) {
                    setTimeout(() => {
                        alert('¡Excelente! Ha mapeado todos los actores del SNA correctamente.');
                    }, 500);
                }
            } else {
                // Wrong Match - Visual Feedback
                const a = selectedActor;
                const f = selectedFunction;
                a.style.borderColor = 'var(--error)';
                f.style.borderColor = 'var(--error)';
                
                setTimeout(() => {
                    a.style.borderColor = '#374151';
                    f.style.borderColor = '#374151';
                    a.classList.remove('selected');
                    f.classList.remove('selected');
                }, 500);

                selectedActor = null;
                selectedFunction = null;
            }
        }
    }

    function showFeedback(title, text) {
        const feedback = document.getElementById('feedbackContainer');
        document.getElementById('feedbackTitle').textContent = title;
        document.getElementById('feedbackText').textContent = text;
        feedback.classList.remove('show');
        void feedback.offsetWidth; // Trigger reflow
        feedback.classList.add('show');
    }

    function updateProgress() {
        const fill = document.getElementById('progressFill');
        const percentage = (matchesCount / data.length) * 100;
        fill.style.width = percentage + '%';
    }

    initGame();
</script>

</body>
</html>
